# eRazOR AI Assistant Configuration

# Ollama Configuration
ollama:
  host: "http://localhost:11434"
  model: "mistral:7b"
  temperature: 0.7  # 0-1: Lower = more focused, Higher = more creative
  context_length: 2048

# AI Assistant Settings
assistant:
  name: "eRazOR AI"
  version: "0.1.0-alpha"
  language: "en"
  debug: false

# Module Configuration
modules:
  pen_testing:
    enabled: true
    max_suggestions: 5
    threat_database: "/data/threat_db"
    
  threat_analyzer:
    enabled: true
    analysis_depth: "medium"  # low, medium, high
    
  attack_predictor:
    enabled: true
    prediction_confidence: 0.7
    
  scripting_helper:
    enabled: true
    supported_languages:
      - python
      - bash
      - powershell
      - ruby

# Security Settings
security:
  require_authorization: false
  log_all_queries: true
  sensitive_data_masking: true
  max_output_length: 4000

# Performance
performance:
  cache_responses: true
  cache_ttl: 3600  # seconds
  max_concurrent_requests: 1
  timeout: 120  # seconds

# Logging
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  file: "/var/log/erazor-ai.log"
  max_size: "10MB"
  backup_count: 5

# Paths
paths:
  data_dir: "/data"
  project_dir: "/data/projects"
  wordlist_dir: "/data/wordlists"
  payload_dir: "/data/payloads"
  config_dir: "/opt/erazor/config"
